<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page %}{{ page.title }} — {% endif %}MD Viewer</title>
  <meta name="description" content="{% if page %}{{ page.title }}{% else %}Documentation{% endif %}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for(blueprint_name + '.static', filename='css/viewer.css') }}" />
</head>
<body>

<!-- ═══════ TOP BAR ═══════════════════════════════════════════════════════ -->
<header class="topbar" id="topbar">
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
    <span></span><span></span><span></span>
  </button>
  <div class="topbar-brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
    </svg>
    <span>{{ root_label }}</span>
  </div>

  <div class="topbar-search">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search docs…" autocomplete="off" />
  </div>

  <div class="topbar-path">
    {% if page %}
    <span class="breadcrumb">{{ page.rel_path.replace('/', ' / ') }}</span>
    {% endif %}
  </div>
</header>

<!-- ═══════ SEARCH RESULTS OVERLAY ════════════════════════════════════════ -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-results" id="searchResults"></div>
</div>

<!-- ═══════ LAYOUT ═════════════════════════════════════════════════════════ -->
<div class="layout" id="layout">

  <!-- ─── SIDEBAR ─────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <nav class="sidebar-nav" id="sidebarNav"></nav>
  </aside>

  <div class="sidebar-resize-handle" id="resizeHandle"></div>

  <!-- ─── CONTENT ─────────────────────────────────────────────────────── -->
  <main class="content-area" id="contentArea">
    {% if page %}
      <article class="md-body" id="mdBody">
        <h1 class="md-page-title">{{ page.title }}</h1>
        {{ page.html | safe }}
      </article>
      {% if page.toc %}
      <aside class="toc-panel" id="tocPanel">
        <div class="toc-label">On this page</div>
        <div class="toc-content">{{ page.toc | safe }}</div>
      </aside>
      {% endif %}
    {% else %}
      <div class="welcome-screen">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="welcome-icon">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <h2>Select a file</h2>
        <p>Choose a Markdown file from the sidebar to get started.</p>
      </div>
    {% endif %}
  </main>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const TREE = {{ tree_json | safe }};
const ACTIVE_PATH = {{ active_path | tojson }};
const BASE_VIEW = "{{ url_for(blueprint_name + '.view', rel_path='__placeholder__') }}".replace('/__placeholder__', '');
const BASE_API  = "{{ url_for(blueprint_name + '.api_search') }}".replace('/search', '');

// ── Tree rendering ────────────────────────────────────────────────────────
function buildTree(nodes, container, depth = 0) {
  nodes.forEach(node => {
    if (node.is_dir) {
      const details = document.createElement('details');
      details.className = 'tree-dir';
      // auto-open if any child is active
      if (ACTIVE_PATH && ACTIVE_PATH.startsWith(node.path)) details.open = true;
      const summary = document.createElement('summary');
      summary.className = 'tree-dir-label';
      summary.innerHTML = `
        <svg class="icon-dir" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
        <span>${node.name}</span>
      `;
      details.appendChild(summary);
      const ul = document.createElement('ul');
      buildTree(node.children, ul, depth + 1);
      details.appendChild(ul);
      container.appendChild(details);
    } else {
      const li = document.createElement('li');
      const a  = document.createElement('a');
      a.href = `${BASE_VIEW}/${node.path}`;
      a.className = 'tree-file' + (node.path === ACTIVE_PATH ? ' active' : '');
      a.innerHTML = `
        <svg class="icon-file" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span>${node.name.replace(/\.md$/i, '')}</span>
      `;
      li.appendChild(a);
      container.appendChild(li);
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {
  buildTree(TREE, document.getElementById('sidebarNav'));

  // ── Sidebar toggle ──────────────────────────────────────────────────
  const toggleBtn = document.getElementById('sidebarToggle');
  const layout    = document.getElementById('layout');
  toggleBtn.addEventListener('click', () => layout.classList.toggle('sidebar-hidden'));

  // ── Resize handle ───────────────────────────────────────────────────
  const handle  = document.getElementById('resizeHandle');
  const sidebar = document.getElementById('sidebar');
  let dragging  = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX   = e.clientX;
    startW   = sidebar.getBoundingClientRect().width;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const w = Math.min(480, Math.max(180, startW + e.clientX - startX));
    sidebar.style.width = w + 'px';
    document.documentElement.style.setProperty('--sidebar-w', w + 'px');
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });

  // ── Search ──────────────────────────────────────────────────────────
  const searchInput   = document.getElementById('searchInput');
  const searchOverlay = document.getElementById('searchOverlay');
  const searchResults = document.getElementById('searchResults');
  let searchTimer;

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = searchInput.value.trim();
    if (!q) { searchOverlay.classList.remove('visible'); return; }
    searchTimer = setTimeout(async () => {
      const res  = await fetch(`${BASE_API}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      if (!data.length) {
        searchResults.innerHTML = '<div class="search-empty">No results found.</div>';
      } else {
        searchResults.innerHTML = data.map(r => `
          <a class="search-item" href="${BASE_VIEW}/${r.rel_path}">
            <div class="search-item-title">${r.title}</div>
            <div class="search-item-path">${r.rel_path}</div>
            <div class="search-item-snippet">${escHtml(r.snippet)}</div>
          </a>
        `).join('');
      }
      searchOverlay.classList.add('visible');
    }, 280);
  });

  document.addEventListener('click', e => {
    if (!searchOverlay.contains(e.target) && e.target !== searchInput)
      searchOverlay.classList.remove('visible');
  });

  // ── Copy code buttons ───────────────────────────────────────────────
  document.querySelectorAll('pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
      const text = pre.querySelector('code')?.innerText ?? pre.innerText;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✓ Copied';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    });
    pre.style.position = 'relative';
    pre.appendChild(btn);
  });

  // ── Scroll-spy for ToC ──────────────────────────────────────────────
  const headings = document.querySelectorAll('.md-body h2, .md-body h3');
  const tocLinks = document.querySelectorAll('.toc-content a');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        tocLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + id));
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px' });
  headings.forEach(h => observer.observe(h));
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
